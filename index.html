<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IRIAM Schedule Generator Stable</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
.wrap{display:flex;gap:20px;padding:20px;box-sizing:border-box}
.panel{width:410px;background:#1c1c1c;border:1px solid #333;border-radius:16px;padding:16px;box-sizing:border-box;max-height:96vh;overflow:auto}
.stage{flex:1}
canvas{width:min(100%,960px);height:auto;border-radius:12px;background:#222;border:1px solid #333;touch-action:none;cursor:grab}
canvas:active{cursor:grabbing}
label{display:block;margin-top:10px;margin-bottom:4px;font-size:13px}
input,textarea,button,select{width:100%;box-sizing:border-box;border:none;border-radius:10px;padding:10px;background:#101010;color:white}
input[type="checkbox"]{width:auto;transform:scale(1.15);margin-right:8px}
input[type="color"]{height:42px;padding:4px}
textarea{resize:vertical;min-height:52px}
button{margin-top:14px;background:#ff8db2;color:#111;font-weight:700;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.checks label{margin:0;background:#101010;border-radius:10px;padding:9px}
.colorBox{display:flex;gap:8px;align-items:center}
.colorCode{background:#000;border-radius:8px;padding:11px 8px;font-size:12px;min-width:82px;text-align:center}
small{color:#aaa}
.section{
  margin-top:14px;
  border:1px solid #333;
  border-radius:14px;
  overflow:hidden;
  background:#171717;
}
.section summary{
  cursor:pointer;
  list-style:none;
  padding:13px 14px;
  font-weight:800;
  background:#242424;
}
.section summary::-webkit-details-marker{display:none}
.section .inner{
  padding:12px 14px 14px;
}
.sectionTitle{
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}
@media(max-width:900px){.wrap{flex-direction:column;padding:10px}.panel{width:100%;max-height:none}.stage{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h2 style="margin-top:0;">IRIAM スケジュール</h2>
    <small>下部プレビューでドラッグ移動出来るようにしました</small>

    <label>背景画像</label>
    <input type="file" id="bgFile" accept="image/*">

    
<div class="section" open>
  <summary>表示設定</summary>
  <div class="inner">
    <div class="checks">
      <label><input type="checkbox" id="showTitle" checked>SCHEDULE表示</label>
      <label><input type="checkbox" id="showName" checked>配信者名表示</label>
      <label><input type="checkbox" id="showMemo" checked>一言メモ表示</label>
      <label><input type="checkbox" id="showBoxes" checked>枠表示</label>
    </div>
  </div>
</div>

<div class="section" open>
  <summary>SCHEDULE</summary>
  <div class="inner">
    <label>SCHEDULE文字</label>
    <input type="text" id="titleText" value="SCHEDULE">

    <label>フォント</label>
    <select id="titleFont">
      <option value="Arial, sans-serif">Arial</option>
      <option value="system-ui, -apple-system, 'Noto Sans JP', sans-serif">ゴシック</option>
      <option value="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif">丸ゴシック</option>
      <option value="'Yu Mincho','Hiragino Mincho ProN',serif">明朝</option>
      <option value="'Comic Sans MS','Hiragino Maru Gothic ProN',cursive">手書き風</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
    </select>

    <div class="row">
      <div>
        <label>サイズ</label>
        <input type="number" id="titleSize" value="62" min="10" max="160">
      </div>
      <div>
        <label>太さ</label>
        <select id="titleWeight">
          <option value="500">普通</option>
          <option value="700" selected>太め</option>
          <option value="900">極太</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="section" open>
  <summary>日付・曜日</summary>
  <div class="inner">
    <label>スケジュール開始日</label>
    <input type="date" id="startDate">

    <div class="row">
      <div>
        <label>曜日サイズ</label>
        <input type="number" id="daySize" value="28" min="8" max="80">
      </div>
      <div>
        <label>日付サイズ</label>
        <input type="number" id="dateSize" value="44" min="8" max="100">
      </div>
    </div>
  </div>
</div>

<div class="section" open>
  <summary>配信者名</summary>
  <div class="inner">
    <label>配信者名</label>
    <input type="text" id="name" value="のんびりB2キープ！">

    <label>フォント</label>
    <select id="nameFont">
      <option value="system-ui, -apple-system, 'Noto Sans JP', sans-serif">ゴシック</option>
      <option value="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif">丸ゴシック</option>
      <option value="'Yu Mincho','Hiragino Mincho ProN',serif">明朝</option>
      <option value="'Comic Sans MS','Hiragino Maru Gothic ProN',cursive">手書き風</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
    </select>

    <div class="row">
      <div>
        <label>サイズ</label>
        <input type="number" id="nameSize" value="54" min="10" max="120">
      </div>
      <div>
        <label>太さ</label>
        <select id="nameWeight">
          <option value="500">普通</option>
          <option value="700" selected>太め</option>
          <option value="900">極太</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="section" open>
  <summary>一言メモ</summary>
  <div class="inner">
    <label>一言メモ</label>
    <textarea id="memo">今週もよろしく！</textarea>

    <label>フォント</label>
    <select id="oneMemoFont">
      <option value="system-ui, -apple-system, 'Noto Sans JP', sans-serif">ゴシック</option>
      <option value="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif">丸ゴシック</option>
      <option value="'Yu Mincho','Hiragino Mincho ProN',serif">明朝</option>
      <option value="'Comic Sans MS','Hiragino Maru Gothic ProN',cursive">手書き風</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
    </select>

    <div class="row">
      <div>
        <label>サイズ</label>
        <input type="number" id="oneMemoSize" value="30" min="10" max="100">
      </div>
      <div>
        <label>太さ</label>
        <select id="oneMemoWeight">
          <option value="500" selected>普通</option>
          <option value="700">太め</option>
          <option value="900">極太</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="section" open>
  <summary>スケジュールメモ</summary>
  <div class="inner">
    <label>フォント</label>
    <select id="scheduleMemoFont">
      <option value="system-ui, -apple-system, 'Noto Sans JP', sans-serif">ゴシック</option>
      <option value="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif">丸ゴシック</option>
      <option value="'Yu Mincho','Hiragino Mincho ProN',serif">明朝</option>
      <option value="'Comic Sans MS','Hiragino Maru Gothic ProN',cursive">手書き風</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
    </select>

    <div class="row">
      <div>
        <label>サイズ</label>
        <input type="number" id="scheduleMemoSize" value="38" min="10" max="100">
      </div>
      <div>
        <label>太さ</label>
        <select id="scheduleMemoWeight">
          <option value="500">普通</option>
          <option value="700" selected>太め</option>
          <option value="900">極太</option>
        </select>
      </div>
    </div>

    <div class="grid">
      <div><label>1</label><textarea id="s0">ゆる雑</textarea></div>
      <div><label>2</label><textarea id="s1">歌枠</textarea></div>
      <div><label>3</label><textarea id="s2">作業枠</textarea></div>
      <div><label>4</label><textarea id="s3">耐久</textarea></div>
      <div><label>5</label><textarea id="s4">企画</textarea></div>
      <div><label>6</label><textarea id="s5">おえかき</textarea></div>
      <div><label>7</label><textarea id="s6">おやすみ</textarea></div>
    </div>
  </div>
</div>

<div class="section">
  <summary>共通文字設定</summary>
  <div class="inner">
    <div class="row">
      <div>
        <label>文字色</label>
        <div class="colorBox">
          <input type="color" id="textColor" value="#111111">
          <div class="colorCode" id="textColorCode">#111111</div>
        </div>
      </div>
      <div>
        <label>文字縁取り色</label>
        <input type="color" id="strokeColor" value="#ffffff">
      </div>
    </div>

    <div class="row">
      <div>
        <label>文字縁取り太さ</label>
        <input type="number" id="strokeWidth" value="0" min="0" max="20">
      </div>
      <div>
        <label>影の強さ</label>
        <input type="number" id="shadowBlur" value="0" min="0" max="40">
      </div>
    </div>
  </div>
</div>

<div class="section">
  <summary>スケジュール枠</summary>
  <div class="inner">
    <div class="row">
      <div>
        <label>枠の色</label>
        <div class="colorBox">
          <input type="color" id="boxColor" value="#ffc8dc">
          <div class="colorCode" id="boxColorCode">#ffc8dc</div>
        </div>
      </div>
      <div>
        <label>枠の透明度</label>
        <input type="number" id="boxOpacity" value="40" min="0" max="100">
      </div>
    </div>

    <div class="row">
      <div>
        <label>枠線の透明度</label>
        <input type="number" id="boxBorderOpacity" value="90" min="0" max="100">
      </div>
      <div>
        <label>枠線の太さ</label>
        <input type="number" id="boxLineWidth" value="2" min="0" max="20">
      </div>
    </div>

    <label>枠の角丸</label>
    <input type="number" id="boxRadius" value="24" min="0" max="80">
  </div>
</div>

<div class="section">
  <summary>背景</summary>
  <div class="inner">
    <label>背景暗さ</label>
    <input type="number" id="bgDarkness" value="0" min="0" max="100">
  </div>
</div>

<button id="resetBtn">位置を初期化</button>
    <button id="exportJsonBtn">位置JSON保存</button>
    <button id="importJsonBtn">位置JSON読込</button>
    <input type="file" id="jsonFile" accept=".json" style="display:none">
    <button id="clearBgBtn">背景画像を消す</button>
    <button id="downloadBtn">PNG保存</button>
  </div>

  <div class="stage">
    <canvas id="canvas" width="1536" height="1024"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let bgImg = null;

const defaultItems = [
  {type:"title", x:768, y:90, w:700, h:90},
  {type:"box", x:55, y:135, w:400, h:130},
  {type:"box", x:55, y:315, w:400, h:130},
  {type:"box", x:55, y:495, w:400, h:130},
  {type:"box", x:55, y:675, w:400, h:130},
  {type:"box", x:1095, y:225, w:400, h:130},
  {type:"box", x:1095, y:585, w:400, h:130},
  {type:"box", x:1095, y:765, w:400, h:130},
  {type:"name", x:768, y:920, w:700, h:70},
  {type:"memo", x:768, y:970, w:700, h:45},
];

let items = JSON.parse(localStorage.getItem("scheduleItemsStableV9") || "null") || structuredClone(defaultItems);
const dayNames = ["sun","mon","tue","wed","thu","fri","sat"];
let dragging = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

function show(id){return document.getElementById(id).checked}
function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(100,alpha))/100})`;
}
function updateColorCodes(){
  document.getElementById("textColorCode").textContent = document.getElementById("textColor").value;
  document.getElementById("boxColorCode").textContent = document.getElementById("boxColor").value;
}
function getPointerPos(e){
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
function getItemBounds(item){
  if(item.type === "name" || item.type === "memo" || item.type === "title"){
    return {x:item.x - item.w/2, y:item.y - item.h/2, w:item.w, h:item.h};
  }
  return item;
}
function isVisibleItem(item){
  if(item.type === "title") return show("showTitle");
  if(item.type === "name") return show("showName");
  if(item.type === "memo") return show("showMemo");
  if(item.type === "box") return show("showBoxes");
  return true;
}
function hitTest(x,y){
  for(let i=items.length-1;i>=0;i--){
    if(!isVisibleItem(items[i])) continue;
    const b = getItemBounds(items[i]);
    if(x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h) return i;
  }
  return null;
}
function saveItems(){localStorage.setItem("scheduleItemsStableV9", JSON.stringify(items))}
function drawCoverImage(img){
  const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
  const w = img.width * scale;
  const h = img.height * scale;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;
  ctx.drawImage(img, x, y, w, h);
}
function roundedRectPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
}
function drawText(text,x,y){
  const sw = Number(document.getElementById("strokeWidth").value || 0);
  if(sw > 0){
    ctx.lineWidth = sw;
    ctx.strokeStyle = document.getElementById("strokeColor").value;
    ctx.strokeText(text,x,y);
  }
  ctx.fillStyle = document.getElementById("textColor").value;
  ctx.fillText(text,x,y);
}
function wrapText(text,x,y,maxWidth,lineHeight){
  let line = "";
  const lines = [];
  for(const ch of text){
    if(ch === "\n"){lines.push(line);line="";continue}
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line){lines.push(line);line=ch}
    else{line=test}
  }
  lines.push(line);
  lines.slice(0,3).forEach((l,i)=>drawText(l,x,y+i*lineHeight));
}
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(bgImg) drawCoverImage(bgImg);
  else{
    ctx.fillStyle = "#f4f4f4";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  const dark = Number(document.getElementById("bgDarkness").value || 0);
  if(dark > 0){
    ctx.fillStyle = `rgba(0,0,0,${dark/100})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  const shadow = Number(document.getElementById("shadowBlur").value || 0);
  ctx.shadowColor = "rgba(0,0,0,0.75)";
  ctx.shadowBlur = shadow;
  ctx.shadowOffsetX = shadow ? 2 : 0;
  ctx.shadowOffsetY = shadow ? 2 : 0;

  const titleItem = items.find(i=>i.type==="title");
  if(show("showTitle")){
    ctx.textAlign = "center";
    ctx.font = `${document.getElementById("titleWeight").value} ${Number(document.getElementById("titleSize").value || 62)}px ${document.getElementById("titleFont").value}`;
    drawText(document.getElementById("titleText").value, titleItem.x, titleItem.y);
  }

  const boxItems = items.filter(i=>i.type==="box");
  if(show("showBoxes")){
    boxItems.forEach((item,index)=>{
      const boxColor = document.getElementById("boxColor").value;
      const boxOpacity = Number(document.getElementById("boxOpacity").value || 40);
      const borderOpacity = Number(document.getElementById("boxBorderOpacity").value || 90);
      const lineWidth = Number(document.getElementById("boxLineWidth").value || 2);
      const radius = Number(document.getElementById("boxRadius").value || 24);

      ctx.shadowBlur = shadow;
      roundedRectPath(item.x,item.y,item.w,item.h,radius);
      ctx.fillStyle = hexToRgba(boxColor, boxOpacity);
      ctx.fill();
      ctx.strokeStyle = hexToRgba(boxColor, borderOpacity);
      ctx.lineWidth = lineWidth;
      ctx.stroke();

      const startDateValue = document.getElementById("startDate").value;
      let day = "";
      let dateText = "";
      if(startDateValue){
        const d = new Date(startDateValue + "T00:00:00");
        d.setDate(d.getDate() + index);
        day = dayNames[d.getDay()];
        dateText = String(d.getDate());
      }

      ctx.textAlign = "left";

      ctx.font = `700 ${Number(document.getElementById("daySize").value || 28)}px Arial, sans-serif`;
      drawText(day, item.x + 24, item.y + 38);

      ctx.font = `700 ${Number(document.getElementById("dateSize").value || 44)}px Arial, sans-serif`;
      drawText(dateText, item.x + 24, item.y + 88);

      const memoSize = Number(document.getElementById("scheduleMemoSize").value || 38);
      ctx.font = `${document.getElementById("scheduleMemoWeight").value} ${memoSize}px ${document.getElementById("scheduleMemoFont").value}`;
      wrapText(document.getElementById("s"+index).value, item.x + 115, item.y + 58, item.w - 140, memoSize * 1.15);
    });
  }

  const nameItem = items.find(i=>i.type==="name");
  const memoItem = items.find(i=>i.type==="memo");
  ctx.textAlign = "center";
  if(show("showName")){
    ctx.font = `${document.getElementById("nameWeight").value} ${Number(document.getElementById("nameSize").value || 54)}px ${document.getElementById("nameFont").value}`;
    drawText(document.getElementById("name").value, nameItem.x, nameItem.y);
  }
  if(show("showMemo")){
    ctx.font = `${document.getElementById("oneMemoWeight").value} ${Number(document.getElementById("oneMemoSize").value || 30)}px ${document.getElementById("oneMemoFont").value}`;
    drawText(document.getElementById("memo").value, memoItem.x, memoItem.y);
  }

  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  if(dragging !== null){
    const b = getItemBounds(items[dragging]);
    ctx.strokeStyle = "rgba(255,120,170,0.95)";
    ctx.lineWidth = 4;
    ctx.strokeRect(b.x,b.y,b.w,b.h);
  }
}

canvas.addEventListener("pointerdown", e=>{
  const p = getPointerPos(e);
  const index = hitTest(p.x,p.y);
  if(index !== null){
    dragging = index;
    const b = getItemBounds(items[index]);
    dragOffsetX = p.x - b.x;
    dragOffsetY = p.y - b.y;
    canvas.setPointerCapture(e.pointerId);
    render();
  }
});
canvas.addEventListener("pointermove", e=>{
  if(dragging === null) return;
  const p = getPointerPos(e);
  const item = items[dragging];
  if(item.type === "name" || item.type === "memo" || item.type === "title"){
    item.x = Math.max(item.w/2, Math.min(canvas.width - item.w/2, p.x - dragOffsetX + item.w/2));
    item.y = Math.max(item.h/2, Math.min(canvas.height - item.h/2, p.y - dragOffsetY + item.h/2));
  }else{
    item.x = Math.max(0, Math.min(canvas.width - item.w, p.x - dragOffsetX));
    item.y = Math.max(0, Math.min(canvas.height - item.h, p.y - dragOffsetY));
  }
  render();
});
canvas.addEventListener("pointerup", ()=>{
  if(dragging !== null){saveItems();dragging=null;render()}
});
canvas.addEventListener("pointercancel", ()=>{
  if(dragging !== null){saveItems();dragging=null;render()}
});

document.querySelectorAll("input,textarea,select").forEach(el=>{
  el.addEventListener("input",()=>{updateColorCodes();render()});
  el.addEventListener("change",()=>{updateColorCodes();render()});
});

document.getElementById("bgFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{bgImg = img; render()};
    img.onerror = ()=>alert("背景画像を読み込めませんでした。");
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById("clearBgBtn").addEventListener("click", ()=>{
  bgImg = null;
  document.getElementById("bgFile").value = "";
  render();
});
document.getElementById("resetBtn").addEventListener("click", ()=>{
  items = structuredClone(defaultItems);
  saveItems();
  render();
});
document.getElementById("exportJsonBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "schedule_positions.json";
  a.click();
});
document.getElementById("importJsonBtn").addEventListener("click", ()=>{
  document.getElementById("jsonFile").click();
});
document.getElementById("jsonFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        items = data;
        saveItems();
        render();
      }
    }catch(err){
      alert("JSONを読み込めませんでした。");
    }
  };
  reader.readAsText(file);
});
document.getElementById("downloadBtn").addEventListener("click", ()=>{
  const oldDragging = dragging;
  dragging = null;
  render();
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = "iriam_schedule.png";
  a.click();
  dragging = oldDragging;
  render();
});

updateColorCodes();
render();
</script>
</body>
</html>
